<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur d'étayage de scène</title>
<link rel="apple-touch-icon" href="icone.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Etayage">
<style>
* {
    box-sizing: border-box;
    transition: all 0.2s ease;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(145deg, #4158D0, #C850C0 50%, #FFCC70);
    min-height: 100vh;
}

.dark {
    background: linear-gradient(145deg, #0B0F1C, #1A1F2F, #2D2F45);
    color: #ffffff;
}

.container {
    max-width: 420px;
    margin: auto;
    position: relative;
}

.titleMain {
    color: white;
    text-align: center;
    margin-bottom: 4px;
    font-size: 28px;
    font-weight: 700;
    text-shadow: 0 4px 10px rgba(0,0,0,0.2);
    letter-spacing: -0.5px;
}

.subtitle {
    color: rgba(255,255,255,0.9);
    text-align: center;
    font-size: 14px;
    margin-top: 0;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
    padding: 8px 16px;
    border-radius: 30px;
    background: rgba(255,255,255,0.1);
    display: inline-block;
    width: auto;
    margin-left: auto;
    margin-right: auto;
}

.dark .subtitle {
    background: rgba(0,0,0,0.3);
    color: rgba(255,255,255,0.9);
}

.card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 30px;
    margin-bottom: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.1);
    border: 1px solid rgba(255,255,255,0.5);
}

.dark .card {
    background: rgba(30, 30, 40, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

.headerRow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

.headerRow h3 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    color: #333;
    letter-spacing: -0.3px;
}

.dark .headerRow h3 {
    color: #e0e0e0;
}

.headerRow select {
    width: 110px;
    height: 40px;
    border-radius: 50px;
    border: 2px solid transparent;
    background: linear-gradient(white, white) padding-box, 
                linear-gradient(45deg, #4158D0, #C850C0) border-box;
    padding: 0 15px;
    font-size: 14px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
    outline: none;
}

.dark .headerRow select {
    background: linear-gradient(#2a2a35, #2a2a35) padding-box, 
                linear-gradient(45deg, #6C5CE7, #A463F5) border-box;
    color: white;
}

.measureRow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
}

.measureRow button {
    width: 48px;
    height: 48px;
    font-size: 24px;
    background: linear-gradient(145deg, #4158D0, #6C5CE7);
    border: none;
    border-radius: 16px;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 16px rgba(65, 88, 208, 0.3);
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
}

.measureRow button:active {
    transform: scale(0.95);
    box-shadow: 0 4px 8px rgba(65, 88, 208, 0.4);
}

.measureRow input {
    flex: 1;
    padding: 12px;
    font-size: 20px;
    text-align: center;
    border-radius: 16px;
    border: 2px solid transparent;
    background: linear-gradient(white, white) padding-box, 
                linear-gradient(45deg, #4158D0, #C850C0) border-box;
    font-weight: 600;
    color: #333;
    outline: none;
}

.dark .measureRow input {
    background: linear-gradient(#2a2a35, #2a2a35) padding-box, 
                linear-gradient(45deg, #6C5CE7, #A463F5) border-box;
    color: white;
}

button.main {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    margin-top: 8px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    letter-spacing: 0.5px;
}

button.main:active {
    transform: translateY(2px);
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.calc {
    background: linear-gradient(45deg, #4158D0, #6C5CE7);
    color: white;
}

.reset {
    background: linear-gradient(45deg, #FF416C, #FF4B2B);
    color: white;
}

.export {
    background: linear-gradient(45deg, #11998e, #38ef7d);
    color: white;
}

.copy {
    background: linear-gradient(45deg, #834d9b, #b24592);
    color: white;
}

.share {
    background: linear-gradient(45deg, #f7971e, #ffd200);
    color: white;
}

.materialBlock {
    background: linear-gradient(135deg, #f5f7fa, #e9ecf5);
    border-radius: 20px;
    padding: 20px;
    margin-top: 10px;
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
}

.dark .materialBlock {
    background: linear-gradient(135deg, #2a2a35, #1f1f2a);
    border: 1px solid rgba(255,255,255,0.05);
}

.materialTitle {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(45deg, #4158D0, #C850C0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
}

.sceneInfo {
    font-size: 14px;
    color: #666;
    margin-bottom: 16px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.5);
    border-radius: 12px;
    display: inline-block;
}

.dark .sceneInfo {
    color: #aaa;
    background: rgba(0,0,0,0.2);
}

#plan {
    width: 100%;
    margin-top: 10px;
    border-radius: 16px;
    background: rgba(255,255,255,0.5);
    padding: 10px;
}

.dark #plan {
    background: rgba(0,0,0,0.3);
}

.modeToggle {
    display: block;
    margin: 0 auto 16px auto;
    padding: 10px 24px;
    border-radius: 50px;
    border: none;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    color: white;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.3);
    font-size: 14px;
}

.modeToggle:hover {
    background: rgba(255,255,255,0.35);
    transform: scale(1.05);
}

.dark .modeToggle {
    background: rgba(0,0,0,0.3);
    color: white;
    border-color: rgba(255,255,255,0.1);
}

#results p {
    margin: 12px 0;
    padding: 8px 12px;
    background: rgba(255,255,255,0.3);
    border-radius: 12px;
    font-weight: 500;
}

.dark #results p {
    background: rgba(255,255,255,0.05);
}

/* Styles pour les onglets (simulés) */
.tab-container {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border-radius: 50px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2);
}

.tab.active {
    background: white;
    color: #4158D0;
    border-color: transparent;
}

.dark .tab.active {
    background: #2a2a35;
    color: #A463F5;
}

/* Animation pour les résultats */
@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.materialBlock {
    animation: slideIn 0.3s ease-out;
}
</style>
</head>
<body>

<div class="container">

<button class="modeToggle" onclick="toggleMode()">🌙 Mode sombre / clair</button>

<h1 class="titleMain">Calculateur d'étayage</h1>

<p class="subtitle">
    📐 1 maille = 2m × 2m
</p>

<div class="card">

    <div class="headerRow">
        <h3>📏 LARGEUR</h3>
        <select id="largeur_unit">
            <option value="maille">mailles</option>
            <option value="metre">mètres</option>
        </select>
    </div>

    <div class="measureRow">
        <button onclick="changeValue('largeur','largeur_unit',-1)">−</button>
        <input id="largeur" type="number" placeholder="0">
        <button onclick="changeValue('largeur','largeur_unit',1)">+</button>
    </div>

    <div class="headerRow">
        <h3>📐 PROFONDEUR</h3>
        <select id="profondeur_unit">
            <option value="maille">mailles</option>
            <option value="metre">mètres</option>
        </select>
    </div>

    <div class="measureRow">
        <button onclick="changeValue('profondeur','profondeur_unit',-1)">−</button>
        <input id="profondeur" type="number" placeholder="0">
        <button onclick="changeValue('profondeur','profondeur_unit',1)">+</button>
    </div>

    <button class="main calc" onclick="calculer()">Calculer</button>
    <button class="main reset" onclick="resetAll()">Reset</button>

</div>

<div class="card">
    <h3>🗺️ Plan d'étayage</h3>
    <svg id="plan"></svg>
</div>

<div class="card">
    <h3>📋 Résultats</h3>
    <div id="results"></div>
</div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

let commandeTexte=""

function toggleMode(){
    document.body.classList.toggle("dark")
    const btn = document.querySelector('.modeToggle')
    btn.textContent = document.body.classList.contains('dark') ? '☀️ Mode clair' : '🌙 Mode sombre'
}

function changeValue(id,unitId,delta){

    let input=document.getElementById(id)
    let unit=document.getElementById(unitId).value

    let value=parseFloat(input.value)||0

    if(unit==="metre"){value+=delta*2}
    else{value+=delta}

    if(value<0)value=0

    input.value=value
}

function toMailles(val,unit){
    if(unit==="maille") return val
    return val/2
}

function calculer(){

    let largeur=parseFloat(document.getElementById("largeur").value)
    if(!largeur) return

    let profondeur=parseFloat(document.getElementById("profondeur").value)
    if(!profondeur) profondeur=1

    let unitL=document.getElementById("largeur_unit").value
    let unitP=document.getElementById("profondeur_unit").value

    let L=Math.round(toMailles(largeur,unitL))
    let P=Math.round(toMailles(profondeur,unitP))

    let largeur_m=L*2
    let profondeur_m=P*2

    let E=L*P
    let moises=(L-1)*P
    let doubles_colliers=Math.ceil(moises/2)

    let poids_total=Math.round((E*13.5)+(moises*7))

    drawPlan(L,P)

    commandeTexte=
`Commande étayage

Scène : ${largeur_m} m × ${profondeur_m} m

Moises : ${moises}
Poteaux : ${E}
Vérins : ${E*2}
Cales bois : ${E*2}
Doubles colliers : ${doubles_colliers}

Poids estimé : ${poids_total} kg`

    document.getElementById("results").innerHTML=`

    <div class="materialBlock" id="commande">

        <div class="materialTitle">📦 Matériel à commander</div>

        <div class="sceneInfo">Pour une scène de ${largeur_m} m × ${profondeur_m} m</div>

        <p>🔩 Moises : <strong>${moises}</strong></p>
        <p>📌 Poteaux : <strong>${E}</strong></p>
        <p>⚙️ Vérins : <strong>${E*2}</strong></p>
        <p>🪵 Cales bois : <strong>${E*2}</strong></p>
        <p>🔗 Doubles colliers : <strong>${doubles_colliers}</strong></p>

        <p style="font-size:13px;color:#666;margin-top:16px;">⚖️ Poids estimé : <strong>${poids_total} kg</strong></p>

    </div>

    <button class="main export" onclick="exportCommande()">📸 Exporter en image</button>
    <button class="main copy" onclick="copierCommande()">📋 Copier la commande</button>
    <button class="main share" onclick="partagerCommande()">📤 Envoyer</button>

    `
}

function copierCommande(){
    navigator.clipboard.writeText(commandeTexte)
    alert("✅ Commande copiée dans le presse-papiers")
}

function partagerCommande(){

    if(navigator.share){
        navigator.share({
            title:"Commande étayage",
            text:commandeTexte
        })
    }else{
        alert("Partage non disponible sur ce navigateur")
    }

}

function drawPlan(L,P){

    let svg=document.getElementById("plan")
    let size=70

    let width=L*size
    let height=P*size

    svg.setAttribute("viewBox",`0 0 ${width} ${height}`)

    let content=""

    // Grille plus moderne
    for(let x=0;x<=L;x++){
        let pos=x*size
        content+=`<line x1="${pos}" y1="0" x2="${pos}" y2="${height}" stroke="#4158D0" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.3"/>`
    }

    for(let y=0;y<=P;y++){
        let pos=y*size
        content+=`<line x1="0" y1="${pos}" x2="${width}" y2="${pos}" stroke="#4158D0" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.3"/>`
    }

    for(let y=0;y<P;y++){
        for(let x=0;x<L;x++){

            let cx=(x+0.5)*size
            let cy=(y+0.5)*size

            // Poteaux avec dégradé
            content+=`<circle cx="${cx}" cy="${cy}" r="8" fill="url(#grad)" stroke="white" stroke-width="2"/>`

            if(x<L-1){
                let nx=(x+1.5)*size
                // Moises avec dégradé
                content+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${cy}" stroke="url(#gradLine)" stroke-width="6" stroke-linecap="round"/>`
            }

        }
    }

    // Définir les dégradés
    content = `<defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4158D0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#C850C0;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradLine" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#4158D0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#C850C0;stop-opacity:1" />
        </linearGradient>
    </defs>` + content

    svg.innerHTML=content
}

function resetAll(){
    document.getElementById("largeur").value=""
    document.getElementById("profondeur").value=""
    document.getElementById("results").innerHTML=""
    document.getElementById("plan").innerHTML=""
}

function exportCommande(){

    html2canvas(document.querySelector("#commande")).then(canvas=>{

        let link=document.createElement("a")
        link.download="commande_etayage.png"
        link.href=canvas.toDataURL()
        link.click()

    })

}

</script>

</body>
</html>
